server {
    listen 80;
    server_name studynoteshub.com www.studynoteshub.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name studynoteshub.com www.studynoteshub.com;

    ssl_certificate     /etc/letsencrypt/live/studynoteshub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studynoteshub.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Frontend static files
    location / {
        root /var/www/studynotes/frontend/dist;
        try_files $uri /index.html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
    }

    location ~* \.(html)$ {
        root /var/www/studynotes/frontend/dist;
        add_header Cache-Control "no-cache";
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
        proxy_connect_timeout 60;
    }

    # Block direct access to uploads dir (PDFs served through Flask)
    location /uploads/ {
        deny all;
        return 403;
    }

    access_log /var/log/nginx/studynotes_access.log;
    error_log  /var/log/nginx/studynotes_error.log;
}
